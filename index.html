        animation: float 4s ease-in-out infinite;
      }

        <i data-lucide="sparkles" class="w-20 h-20"></i>
      </div>

      <h1 class="text-6xl md:text-7xl uppercase font-black tracking-tighter text-[#fb8500] drop-shadow-2xl">
        じゅんびちゅう...

      <div class="mt-6 flex items-center gap-2 text-orange-200/50 font-mono text-xs uppercase tracking-[0.3em]">
