<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }
    </style>
  </head>

  <body class="bg-gradient-to-br from-[#023047] via-[#000814] to-black text-white min-h-screen overflow-hidden">
    
    <header class="fixed top-0 w-full p-6 flex justify-between items-center z-20 border-b border-orange-500/10 backdrop-blur-md">
      <div class="flex items-center gap-2">
        <i data-lucide="terminal" class="text-[#fb8500] w-5 h-5"></i>
        <span class="font-mono text-sm tracking-widest uppercase text-orange-200/70">System_Core v1.0</span>
      </div>
      <div class="px-3 py-1 rounded-full border border-[#fb8500]/30 text-[10px] uppercase tracking-tighter text-[#fb8500] bg-[#fb8500]/5">
        Live Status
      </div>
    </header>

    <div class="fixed inset-0 bg-[radial-gradient(circle_at_50%_50%,_rgba(251,133,0,0.1),transparent_75%)] pointer-events-none"></div>

    <main class="flex flex-col items-center justify-center h-screen text-center p-4 relative z-10">
      <div class="mb-8 text-[#fb8500] animate-float drop-shadow-[0_0_30px_rgba(251,133,0,0.5)]">
        <i data-lucide="zap" class="w-24 h-24"></i>
      </div>

      <h1 class="text-6xl md:text-8xl uppercase font-black tracking-tighter text-[#fb8500] drop-shadow-2xl italic">
        じゅんびちゅう...
      </h1>
      
      <div class="mt-8 space-y-2">
        <p class="text-xl font-medium text-orange-100 uppercase tracking-wide">Cooking something legendary</p>
        <p class="text-sm font-mono text-orange-500/60 lowercase tracking-widest italic">Hang tight, we're almost there</p>
      </div>
    </main>

    <footer class="fixed bottom-6 w-full text-center z-20 opacity-30">
      <div class="text-[10px] font-mono uppercase tracking-[0.5em]">Optimized for Hyprland // Arch Linux</div>
    </footer>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
