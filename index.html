<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .animate-float {
        animation: float 3s ease-in-out infinite;
      }
    </style>
  </head>

  <body class="bg-black text-white selection:bg-[#fb8500] selection:text-black">
    <div class="fixed inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-[#fb8500]/10 via-black to-black -z-10"></div>

    <main class="flex flex-col items-center justify-center h-screen text-center p-4">
      <div class="mb-6 text-[#fb8500] animate-float">
        <i data-lucide="loader-2" class="w-16 h-16 animate-spin"></i>
      </div>

      <h1 class="text-5xl md:text-6xl uppercase font-black tracking-tighter text-[#fb8500] drop-shadow-[0_0_15px_rgba(251,133,0,0.3)]">
        じゅんびちゅう...
      </h1>
      
      <p class="mt-4 text-gray-500 font-mono text-sm uppercase tracking-widest">
        System Initializing
      </p>
    </main>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
